<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#79c0ff"/>
      <stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="none" stroke="#30363d" stroke-width="6"/>

  <g transform="translate(512 512)" filter="url(#glow)">
    <circle cx="0" cy="0" r="240" fill="none" stroke="url(#accent)" stroke-width="22" opacity="0.55"/>
    <circle cx="0" cy="0" r="170" fill="none" stroke="url(#accent)" stroke-width="18" opacity="0.85"/>
    <circle cx="0" cy="0" r="96"  fill="url(#accent)"/>
  </g>

  <g fill="none" stroke="#58a6ff" stroke-width="14" stroke-linecap="round" opacity="0.7">
    <line x1="200" y1="512" x2="270" y2="512"/>
    <line x1="754" y1="512" x2="824" y2="512"/>
    <line x1="512" y1="200" x2="512" y2="270"/>
    <line x1="512" y1="754" x2="512" y2="824"/>
  </g>

  <g fill="#0d1117" font-family="-apple-system, ui-sans-serif, system-ui" font-weight="800" font-size="118" text-anchor="middle">
    <text x="512" y="555">gm</text>
  </g>
</svg>
